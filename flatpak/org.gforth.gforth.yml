app-id: org.gforth.gforth
runtime: org.freedesktop.Platform
platform-extensions:
  - org.freedesktop.Platform.GL.default
runtime-version: "25.08"
branch: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.stb
command: gforth

modules:
  - name: gforth
    buildsystem: autotools
    config-opts:
      - "CPPFLAGS=-I/usr/lib/sdk/stb/include"
      - "ac_cv_search_init_disassemble_info=no"
      - "--disable-lib"
      - "--with-lispdir=/app/share/emacs/site-lisp"
      - "--with-elispstartdir=/app/share/emacs/site-start.d"
    no-autogen: true
    sources:
      - type: archive
        url: https://net2o.de/gforth-dist/Snapshots/0.7.9_20260513/gforth-0.7.9_20260513.tar.xz
        sha256: 6fe1fd9eac08cd6c952b215dca3e6a53fb7bb1edd11a626e440dd2a625914153
