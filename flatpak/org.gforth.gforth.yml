app-id: org.gforth.gforth
runtime: org.freedesktop.Platform
platform-extensions:
  - org.freedesktop.Platform.GL.default
runtime-version: "25.08"
branch: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.stb
command: gforth

modules:
  - name: gforth
    buildsystem: autotools
    config-opts:
      - "CPPFLAGS=-I/usr/lib/sdk/stb/include"
      - "ac_cv_search_init_disassemble_info=no"
      - "--disable-lib"
      - "--with-lispdir=/app/share/emacs/site-lisp"
      - "--with-elispstartdir=/app/share/emacs/site-start.d"
    no-autogen: true
    sources:
      - type: archive
        url: https://net2o.de/gforth-dist/Snapshots/0.7.9_20260703/gforth-0.7.9_20260703.tar.xz
        sha256: 27da3adf37c22101838c9ace2c6bdd9d8b628f1a52cb3506e06bb5512ef6055d
